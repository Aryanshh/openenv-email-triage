name: "atlas-greenpath"
version: "1.0.0"
description: "An eco-resilient logistics RL environment where an agent balances time, cost, and carbon footprint during supply chain disruptions."
author: "aryanshh"
tags:
  - "openenv"
  - "logistics"
  - "esg"
  - "supply-chain"

observation_space:
  step: integer
  inventory:
    chips: integer
    sensors: integer
    batteries: integer
    casing: integer
  active_shipments:
    type: list
    schema:
      id: string
      part: string
      quantity: integer
      mode: string
      eta: integer
      carbon_impact: float
      cost: float
  pending_orders:
    type: list
    schema:
      id: string
      product: string
      quantity: integer
      due_date: integer
      reward: float
  carbon_total: float
  carbon_quota: float
  cash_balance: float
  news: 
    type: string
    optional: true

action_space:
  action_type:
    type: enum
    values:
      - order_parts
      - reroute
      - produce
      - offset
      - skip
  part_type:
    type: string
    optional: true
  quantity:
    type: integer
    optional: true
  mode:
    type: string
    optional: true
  shipment_id:
    type: string
    optional: true
  product:
    type: string
    optional: true
  offset_amount:
    type: float
    optional: true

reward_range: [0.01, 0.99]
max_steps: 50

tasks:
  - name: easy
    description: "Fulfill orders using the most carbon-efficient routes."
  - name: medium
    description: "Navigate a port strike disruption by re-routing shipments."
  - name: hard
    description: "Maximize resiliency during a global crisis while staying under a strict carbon quota."
